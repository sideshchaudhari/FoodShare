<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donation Accepted | FoodShare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #e8f5e9);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
        }

        .icon {
            font-size: 60px;
            color: #0F9D58;
        }
    </style>
</head>
<body>

<div class="card">
    <i class="bi bi-check-circle-fill icon mb-3"></i>

    <h3 class="fw-bold">Donation Accepted!</h3>
    <p class="text-muted">
        You have successfully accepted the donation.
    </p>

    <!-- 🧾 REPORT BUTTON -->
    <a href="/ngo/download_report/{{ donation_id }}"
       class="btn btn-success btn-lg rounded-pill px-4 mt-3">
        <i class="bi bi-file-earmark-text me-2"></i>Download Report
    </a>

    <!-- 🔙 DASHBOARD -->
    <div class="mt-3">
        <a href="/ngo/dashboard" class="btn btn-outline-secondary">
            Back to Dashboard
        </a>
    </div>
</div>

</body>
</html>
