<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | FoodShare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 480px;
        }

        .brand {
            text-align: center;
            margin-bottom: 20px;
            color: white;
            cursor: pointer;
        }

        .register-card {
            background: white;
            border-radius: 22px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            animation: fadeUp 0.8s ease;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px;
        }

        .btn-register {
            background: #0F9D58;
            color: white;
            font-weight: 600;
            border-radius: 50px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            background: #0b7541;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="auth-wrapper">

    <!-- BRAND / BACK TO HOME -->
    <div class="brand" onclick="window.location.href='/'">
        <h4 class="fw-bold"><i class="bi bi-recycle me-2"></i>FoodShare</h4>
        <small>← Back to Home</small>
    </div>

    <!-- REGISTER CARD -->
    <div class="register-card">
        <h3 class="fw-bold text-center mb-2">Join FoodShare 🌱</h3>
        <p class="text-muted text-center mb-4">Create your free account</p>

        <form method="POST">

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Register As</label>
                <select name="role" class="form-select" required>
                    <option value="">Select Role</option>
                    <option value="donor">Food Donor</option>
                    <option value="ngo">NGO</option>
                </select>
            </div>

            <button class="btn btn-register w-100 mt-3">
                Create Account
            </button>
        </form>

        <p class="text-center text-muted mt-4">
            Already have an account? <a href="/login">Login</a>
        </p>
    </div>
</div>

</body>
</html>
