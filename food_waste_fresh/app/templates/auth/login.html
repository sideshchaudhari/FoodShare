<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | FoodShare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .brand {
            text-align: center;
            margin-bottom: 20px;
            color: white;
            cursor: pointer;
        }

        .login-card {
            background: white;
            border-radius: 22px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .btn-login {
            background: #0F9D58;
            color: white;
            font-weight: 600;
            border-radius: 50px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: #0b7541;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .back-link {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">

    <!-- BRAND / BACK TO HOME -->
    <div class="brand" onclick="window.location.href='/'">
        <h4 class="fw-bold"><i class="bi bi-recycle me-2"></i>FoodShare</h4>
        <small>← Back to Home</small>
    </div>

    <!-- LOGIN CARD -->
    <div class="login-card">
        <h3 class="fw-bold text-center mb-2">Welcome Back 👋</h3>
        <p class="text-muted text-center mb-4">Login to continue your impact</p>

        <form method="POST">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button class="btn btn-login w-100 mt-3">
                Login
            </button>
        </form>

        <p class="text-center text-muted mt-4">
            New to FoodShare? <a href="/register">Create an account</a>
        </p>
    </div>
</div>

</body>
</html>
