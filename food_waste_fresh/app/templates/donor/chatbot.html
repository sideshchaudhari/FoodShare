<!DOCTYPE html>
<html>
<head>
    <title>FoodShare Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #e9eef5;
            margin: 0;
        }

        .chat-container {
            width: 420px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .header {
            background: #2b6777;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        #chat {
            height: 420px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 12px;
            border-radius: 10px;
            max-width: 75%;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background: #4da3ff;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: #f1f1f1;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 16px;
            border: none;
            background: #2b6777;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f4c57;
        }

        .typing {
            font-style: italic;
            color: gray;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">FoodShare Assistant 🤖</div>

    <div id="chat"></div>

    <div class="input-area">
        <input id="msg" placeholder="Type your message..." onkeypress="handleKey(event)">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
function scrollChat() {
    let chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;
}

function addMessage(text, className) {
    let div = document.createElement("div");
    div.classList.add("msg", className);
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    scrollChat();
}

function showTyping() {
    let div = document.createElement("div");
    div.classList.add("msg", "bot", "typing");
    div.id = "typing";
    div.innerText = "Bot is typing...";
    document.getElementById("chat").appendChild(div);
    scrollChat();
}

function removeTyping() {
    let t = document.getElementById("typing");
    if (t) t.remove();
}

function sendMsg() {
    let input = document.getElementById("msg");
    let message = input.value.trim();

    if (message === "") return;

    addMessage(message, "user");
    input.value = "";

    showTyping();

    fetch("/donor/chatbot/message", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        removeTyping();
        addMessage(data.reply, "bot");
    });
}

function handleKey(event) {
    if (event.key === "Enter") {
        sendMsg();
    }
}
</script>

</body>
</html>
