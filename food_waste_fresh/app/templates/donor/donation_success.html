<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donation Successful | FoodShare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
        }

        .success-icon {
            font-size: 60px;
            color: #0F9D58;
        }
    </style>
</head>
<body>

<div class="card">
    <i class="bi bi-check-circle-fill success-icon mb-3"></i>

    <h3 class="fw-bold">Donation Successful!</h3>
    <p class="text-muted">
        NGOs have been notified. You can download your receipt below.
    </p>

    <!-- ✅ RECEIPT BUTTON -->
    <a href="/donor/download_receipt/{{ donation_id }}"
       class="btn btn-success btn-lg rounded-pill px-4 mt-3">
        <i class="bi bi-download me-2"></i>Download Receipt
    </a>

    <div class="mt-4">
        <a href="/donor/dashboard" class="btn btn-outline-secondary">
            Go to Dashboard
        </a>
    </div>
</div>

</body>
</html>
